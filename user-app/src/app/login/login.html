<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-3">Login</h3>

    <input [(ngModel)]="email" class="form-control mb-3" placeholder="Enter Email">
    <input [(ngModel)]="password" type="password" class="form-control mb-3" placeholder="Enter Password">

    <button (click)="login()" class="btn btn-success w-100 mb-2">Login</button>

    <p class="text-center">
      Don't have an account?
      <a routerLink="/">Register</a>
    </p>

  </div>
</div>
