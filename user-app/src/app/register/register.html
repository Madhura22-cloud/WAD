<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="card p-4 shadow" style="width: 350px;">
    
    <h3 class="text-center mb-3">Register</h3>

    <input [(ngModel)]="user.name" class="form-control mb-3" placeholder="Enter Name">
    <input [(ngModel)]="user.email" class="form-control mb-3" placeholder="Enter Email">
    <input [(ngModel)]="user.password" type="password" class="form-control mb-3" placeholder="Enter Password">

    <button (click)="register()" class="btn btn-primary w-100 mb-2">Register</button>

    <p class="text-center">
      Already have an account?
      <a routerLink="/login">Login</a>
    </p>

  </div>
</div>
