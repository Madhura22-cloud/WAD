<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Registration</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2>User Registration</h2>

<form id="userForm">
    <input type="text" id="name" class="form-control mb-3" placeholder="Enter Name" required>
    <input type="email" id="email" class="form-control mb-3" placeholder="Enter Email" required>
    <input type="password" id="password" class="form-control mb-3" placeholder="Enter Password" required>

    <button class="btn btn-primary">Register</button>
</form>

<script>
let users = JSON.parse(localStorage.getItem("users")) || [];

document.getElementById("userForm").addEventListener("submit", function(e) {
    e.preventDefault();

    let user = {
        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        password: document.getElementById("password").value
    };

    // Push to array
    users.push(user);

    // Save to localStorage
    localStorage.setItem("users", JSON.stringify(users));

    // AJAX POST (Simulation)
    fetch("https://jsonplaceholder.typicode.com/posts", {
        method: "POST",
        body: JSON.stringify(user),
        headers: {
            "Content-type": "application/json; charset=UTF-8"
        }
    })
    .then(response => response.json())
    .then(data => {
        alert("User Registered Successfully!");
        window.location.href = "users.html";
    })
    .catch(err => console.log(err));
});
</script>

</body>
</html>
