<!DOCTYPE html>
<html>
<head>
    <title>Mobile Website</title>

    <!-- jQuery Mobile CDN -->
    <link rel="stylesheet" href="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.css">
    <script src="https://code.jquery.com/jquery-1.11.1.min.js"></script>
    <script src="https://code.jquery.com/mobile/1.4.5/jquery.mobile-1.4.5.min.js"></script>

    <meta name="viewport" content="width=device-width, initial-scale=1">
</head>

<body>

<!-- Home Page -->
<div data-role="page" id="home">

    <div data-role="header">
        <h1>My Mobile App</h1>
    </div>

    <div data-role="content">
        <h2>Welcome!</h2>
        <a href="#about" class="ui-btn ui-btn-b">Go to About</a>
        <a href="#contact" class="ui-btn ui-btn-b">Contact</a>
    </div>

    <div data-role="footer">
        <h4>© 2026</h4>
    </div>
</div>

<!-- About Page -->
<div data-role="page" id="about">

    <div data-role="header">
        <h1>About</h1>
    </div>

    <div data-role="content">
        <p>This is a simple mobile website using jQuery Mobile.</p>
        <a href="#home" class="ui-btn">Back</a>
    </div>
</div>

<!-- Contact Page -->
<div data-role="page" id="contact">

    <div data-role="header">
        <h1>Contact</h1>
    </div>

    <div data-role="content">
        <form>
            <label>Name:</label>
            <input type="text">

            <label>Email:</label>
            <input type="email">

            <button class="ui-btn ui-btn-b">Submit</button>
        </form>
        <a href="#home" class="ui-btn">Back</a>
    </div>
</div>

</body>
</html>
